<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <title>
        Transfer Money
    </title>

    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet">

</head>

<body class="container mt-5">

<h1 class="mb-4">

    Transfer Money

</h1>

<form action="/web/transfer"
      method="post">

    <div class="mb-3">

        <label>From Account</label>

        <input type="text"
               name="fromAccount"
               class="form-control">

    </div>

    <div class="mb-3">

        <label>To Account</label>

        <input type="text"
               name="toAccount"
               class="form-control">

    </div>

    <div class="mb-3">

        <label>Amount</label>

        <input type="number"
               name="amount"
               class="form-control">

    </div>

    <button type="submit"
            class="btn btn-info">

        Transfer

    </button>

</form>

</body>

</html>
