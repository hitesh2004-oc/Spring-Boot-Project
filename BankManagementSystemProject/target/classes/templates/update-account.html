<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <title>
        Update Account
    </title>

    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet">

</head>

<body class="container mt-5">

<h1 class="mb-4">

    Update Account

</h1>

<form th:action="@{/update/{id}(id=${account.id})}"
      th:object="${account}"
      method="post">

    <div class="mb-3">

        <label>Name</label>

        <input type="text"
               th:field="*{name}"
               class="form-control">

    </div>

    <div class="mb-3">

        <label>Account Number</label>

        <input type="text"
               th:field="*{accountNumber}"
               class="form-control">

    </div>

    <div class="mb-3">

        <label>Balance</label>

        <input type="number"
               th:field="*{balance}"
               class="form-control">

    </div>

    <div class="mb-3">

        <label>Branch</label>

        <input type="text"
               th:field="*{branch}"
               class="form-control">

    </div>

    <button type="submit"
            class="btn btn-primary">

        Update Account

    </button>

</form>

</body>

</html>
