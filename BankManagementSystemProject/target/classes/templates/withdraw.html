<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <title>
        Withdraw Money
    </title>

    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet">

</head>

<body class="container mt-5">

<h1 class="mb-4">

    Withdraw Money

</h1>

<form action="/web/withdraw"
      method="post">

    <div class="mb-3">

        <label>Account Number</label>

        <input type="text"
               name="accountNumber"
               class="form-control">

    </div>

    <div class="mb-3">

        <label>Amount</label>

        <input type="number"
               name="amount"
               class="form-control">

    </div>

    <button type="submit"
            class="btn btn-warning">

        Withdraw

    </button>

</form>

</body>

</html>
