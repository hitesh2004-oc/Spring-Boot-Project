<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>
        Bank Management System
    </title>

    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <h1 class="text-center mb-5">

        Bank Management System

    </h1>

    <!-- Top Buttons -->
    <div class="d-flex justify-content-between mb-4">

        <a href="/add"
           class="btn btn-primary">

            Add Account

        </a>

        <!-- Search -->
        <form action="/search"
              method="get"
              class="d-flex">

            <input type="text"
                   name="keyword"
                   class="form-control me-2"
                   placeholder="Search Account">

            <button type="submit"
                    class="btn btn-dark">

                Search

            </button>

        </form>

    </div>

    <!-- Transaction Buttons -->
    <div class="mb-4">

        <a href="/deposit"
           class="btn btn-success">

            Deposit

        </a>

        <a href="/withdraw"
           class="btn btn-warning">

            Withdraw

        </a>

        <a href="/transfer"
           class="btn btn-info">

            Transfer

        </a>

    </div>

    <!-- Account Table -->
    <table class="table table-bordered table-hover">

        <thead class="table-dark">

        <tr>

            <th>ID</th>
            <th>Name</th>
            <th>Account Number</th>
            <th>Balance</th>
            <th>Branch</th>
            <th>Action</th>

        </tr>

        </thead>

        <tbody>

        <tr th:each="a : ${accounts}">

            <td th:text="${a.id}"></td>

            <td th:text="${a.name}"></td>

            <td th:text="${a.accountNumber}"></td>

            <td th:text="${a.balance}"></td>

            <td th:text="${a.branch}"></td>

            <td>

                <a th:href="@{/edit/{id}(id=${a.id})}"
                   class="btn btn-warning btn-sm">

                    Edit

                </a>

                <a th:href="@{/delete/{id}(id=${a.id})}"
                   class="btn btn-danger btn-sm">

                    Delete

                </a>

            </td>

        </tr>

        </tbody>

    </table>

</div>

</body>

</html>
