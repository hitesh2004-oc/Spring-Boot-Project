<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <title>Employee Form</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body class="container mt-5">

<h2 class="mb-4 text-center">
    Employee Form (Add / Update)
</h2>

<form th:action="@{/save}"
      th:object="${employee}"
      method="post">

    <!-- IMPORTANT: Hidden ID for UPDATE -->
    <input type="hidden" th:field="*{id}">

    <div class="mb-3">

        <label>Name</label>
        <input type="text"
               th:field="*{name}"
               class="form-control"
               placeholder="Enter Name">

    </div>

    <div class="mb-3">

        <label>Department</label>
        <input type="text"
               th:field="*{department}"
               class="form-control"
               placeholder="Enter Department">

    </div>

    <div class="mb-3">

        <label>Salary</label>
        <input type="number"
               th:field="*{salary}"
               class="form-control"
               placeholder="Enter Salary">

    </div>

    <div class="mb-3">

        <label>City</label>
        <input type="text"
               th:field="*{city}"
               class="form-control"
               placeholder="Enter City">

    </div>

    <button type="submit"
            class="btn btn-success w-100">

        Save / Update Employee

    </button>

</form>

<div class="text-center mt-3">

    <a href="/" class="btn btn-secondary">
        Back to Home
    </a>

</div>

</body>
</html>
