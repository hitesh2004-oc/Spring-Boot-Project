<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <title>
        Update Employee
    </title>

    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet">

</head>

<body class="container mt-5">

<h1 class="mb-4">

    Update Employee

</h1>

<form th:action="@{/update/{id}(id=${employee.id})}"
      th:object="${employee}"
      method="post">

    <div class="mb-3">

        <label>Name</label>

        <input type="text"
               th:field="*{name}"
               class="form-control">

    </div>

    <div class="mb-3">

        <label>Department</label>

        <input type="text"
               th:field="*{department}"
               class="form-control">

    </div>

    <div class="mb-3">

        <label>Salary</label>

        <input type="number"
               th:field="*{salary}"
               class="form-control">

    </div>

    <div class="mb-3">

        <label>City</label>

        <input type="text"
               th:field="*{city}"
               class="form-control">

    </div>

    <button type="submit"
            class="btn btn-primary">

        Update Employee

    </button>

</form>

</body>

</html>
