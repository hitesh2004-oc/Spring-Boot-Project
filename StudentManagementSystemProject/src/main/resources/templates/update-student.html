<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Update Student</title>

    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet">

</head>

<body class="container mt-5">

<h1>Update Student</h1>

<form th:action="@{/update/{id}(id=${student.id})}"
      th:object="${student}"
      method="post">

    <div class="mb-3">

        <label>Name</label>

        <input type="text"
               th:field="*{name}"
               class="form-control">

    </div>

    <div class="mb-3">

        <label>City</label>

        <input type="text"
               th:field="*{city}"
               class="form-control">

    </div>

    <button type="submit"
            class="btn btn-primary">

        Update
    </button>

</form>

</body>
</html>
