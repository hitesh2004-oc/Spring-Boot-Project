<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <title>
        Library Login
    </title>

    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet">

    <link
            rel="stylesheet"
            th:href="@{/css/style.css}">

</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-5">

            <div class="card shadow">

                <div class="card-header text-center bg-primary text-white">

                    <h2>
                        Library Login
                    </h2>

                </div>

                <div class="card-body">

                    <form
                            method="post"
                            action="/login">

                        <div class="mb-3">

                            <label>
                                Username
                            </label>

                            <input
                                    type="text"
                                    name="username"
                                    class="form-control"
                                    placeholder="Enter Username">

                        </div>

                        <div class="mb-3">

                            <label>
                                Password
                            </label>

                            <input
                                    type="password"
                                    name="password"
                                    class="form-control"
                                    placeholder="Enter Password">

                        </div>

                        <button
                                class="btn btn-primary w-100">

                            Login

                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

</body>

</html>
