<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <title>
        Update Book
    </title>

    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet">

</head>

<body>

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-6">

            <div class="card shadow">

                <div class="card-header bg-warning">

                    <h2>
                        Update Book
                    </h2>

                </div>

                <div class="card-body">

                    <form
                            th:action="@{/update/{id}(id=${book.id})}"
                            method="post"
                            th:object="${book}">

                        <div class="mb-3">

                            <label>
                                Title
                            </label>

                            <input
                                    type="text"
                                    th:field="*{title}"
                                    class="form-control">

                        </div>

                        <div class="mb-3">

                            <label>
                                Author
                            </label>

                            <input
                                    type="text"
                                    th:field="*{author}"
                                    class="form-control">

                        </div>

                        <div class="mb-3">

                            <label>
                                Price
                            </label>

                            <input
                                    type="number"
                                    th:field="*{price}"
                                    class="form-control">

                        </div>

                        <button
                                class="btn btn-primary">

                            Update

                        </button>

                        <a href="/"
                           class="btn btn-secondary">

                            Back

                        </a>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

</body>

</html>
