<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <title>
        Library Dashboard
    </title>

    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet">

    <link
            rel="stylesheet"
            th:href="@{/css/style.css}">

</head>

<body>

<div class="container mt-5">

    <div class="d-flex justify-content-between">

        <h1>
            Library Management System
        </h1>

        <a href="/logout"
           class="btn btn-danger">

            Logout

        </a>

    </div>

    <hr>

    <div class="mb-3">

        <a href="/add"
           class="btn btn-success">

            Add Book

        </a>

    </div>

    <form
            action="/search"
            method="get"
            class="mb-4">

        <div class="row">

            <div class="col-md-10">

                <input
                        type="text"
                        name="keyword"
                        class="form-control"
                        placeholder="Search Book By Title">

            </div>

            <div class="col-md-2">

                <button
                        class="btn btn-primary w-100">

                    Search

                </button>

            </div>

        </div>

    </form>

    <table class="table table-bordered table-hover">

        <thead class="table-dark">

        <tr>

            <th>ID</th>

            <th>Title</th>

            <th>Author</th>

            <th>Price</th>

            <th>Status</th>

            <th>Actions</th>

        </tr>

        </thead>

        <tbody>

        <tr th:each="b : ${books}">

            <td th:text="${b.id}"></td>

            <td th:text="${b.title}"></td>

            <td th:text="${b.author}"></td>

            <td th:text="${b.price}"></td>

            <td th:text="${b.status}"></td>

            <td>

                <a th:href="@{/edit/{id}(id=${b.id})}"
                   class="btn btn-warning btn-sm">

                    Edit

                </a>

                <a th:href="@{/delete/{id}(id=${b.id})}"
                   class="btn btn-danger btn-sm">

                    Delete

                </a>

                <a th:href="@{/issue/{id}(id=${b.id})}"
                   class="btn btn-info btn-sm">

                    Issue

                </a>

                <a th:href="@{/return/{id}(id=${b.id})}"
                   class="btn btn-secondary btn-sm">

                    Return

                </a>

            </td>

        </tr>

        </tbody>

    </table>

</div>

<script th:src="@{/js/script.js}"></script>

</body>

</html>
